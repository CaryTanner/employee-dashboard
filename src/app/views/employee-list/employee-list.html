<div class="flex flex-col items-center min-h-screen bg-gray-50 py-10 px-4 sm:px-0">
  <h1 class="text-3xl font-bold mb-10">Anställdslista</h1>
  <ul class="flex flex-col items-center gap-6 w-full max-w-lg" aria-label="Anställdskort lista">
    @for (employee of list(); track employee.id) {
      <li class="w-full">
        <app-list-card [employee]="employee" />
      </li>
    }
  </ul>
</div>
