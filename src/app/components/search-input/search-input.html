<label for="Sök anställda" class="block w-full mb-6">
  <div class="flex justify-end">
    <span class="text-sm font-medium text-gray-800 whitespace-nowrap">Sök anställda</span>
  </div>
  <div class="relative">
    <input
      type="text"
      id="Sök anställda"
      class="bg-white p-3 w-full rounded-md border border-gray-300 shadow-sm"
      [formControl]="form()"
    />
    <span
      class="absolute inset-y-0 right-2 grid w-8 place-content-center material-symbols-outlined text-gray-500"
      aria-hidden="true"
    >
      search
    </span>
  </div>
</label>
