<a
  [routerLink]="link()"
  [state]="employee()"
  [attr.aria-label]="ariaLabel()"
  class="flex items-center gap-6 rounded-md border border-gray-300 bg-white p-3 shadow-sm sm:p-5 focus-visible:outline-2 focus-visible:outline-indigo-600"
>
  <app-employee-avatar [employeeName]="employee().employee_name" [hideOnMobile]="true" />
  <h2 class="text-lg font-medium text-gray-900 whitespace-nowrap">
    {{ employee().employee_name }}
  </h2>
  <span class="flex-1"></span>
  <span aria-hidden="true" class="material-symbols-outlined text-indigo-600">
    arrow_right_alt
  </span>
</a>
