<button
  type="button"
  class="mb-6 self-start rounded border border-indigo-700 bg-white px-4 py-2 text-sm font-medium text-indigo-700 hover:bg-indigo-50 focus-visible:outline focus-visible:outline-2 focus-visible:outline-indigo-600 transition cursor-pointer"
  [routerLink]="link()"
  [state]="routerState()"
  [attr.aria-label]="ariaLabelText() ? ariaLabelText() : 'Länk till ' + link()"
>
  <ng-content></ng-content>
</button>
